<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher Grading Book</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e1b4b">
    <link rel="icon" sizes="192x192" href="./icons/icon-192.png">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #0f0e17;
            --ink-2: #2e2b5f;
            --surface: #f5f4ff;
            --card: #ffffff;
            --accent: #4338ca;
            --accent-2: #7c3aed;
            --emerald: #059669;
            --rose: #e11d48;
            --amber: #d97706;
            --border: #e0dff8;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Sora', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
            background: var(--surface);
            color: var(--ink);
        }

        .mono { font-family: 'DM Mono', monospace; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pop {
            0% { transform: scale(0.94); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes slide-right {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .animate-slide-up { animation: slide-up 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .animate-fade { animation: fade-in 0.2s ease both; }
        .animate-pop { animation: pop 0.25s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .animate-slide-right { animation: slide-right 0.3s cubic-bezier(0.16, 1, 0.3, 1) both; }

        .press:active { transform: scale(0.94); transition: transform 0.08s; }

        /* Table styles */
        .grade-table { border-collapse: separate; border-spacing: 0; width: 100%; }
        .grade-table th, .grade-table td { padding: 0; }
        .grade-table thead th {
            background: #1e1b4b;
            color: white;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 10px 12px;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .grade-table thead th:first-child {
            position: sticky;
            left: 0;
            z-index: 20;
            border-radius: 0;
            min-width: 130px;
        }
        .grade-table tbody tr:nth-child(even) td { background: #f8f7ff; }
        .grade-table tbody tr:nth-child(odd) td { background: white; }
        .grade-table tbody tr:hover td { background: #eef2ff !important; }
        .grade-table tbody td:first-child {
            position: sticky;
            left: 0;
            font-size: 11px;
            font-weight: 700;
            color: var(--ink-2);
            padding: 10px 12px;
            border-right: 2px solid var(--border);
            min-width: 130px;
            white-space: nowrap;
            z-index: 5;
        }
        /* Clickable student row */
        .grade-table tbody tr { cursor: pointer; }
        .grade-table tbody td:first-child .student-name-btn {
            background: none; border: none; cursor: pointer;
            font: inherit; color: inherit; font-size: 11px; font-weight: 700;
            padding: 0; text-align: left; width: 100%;
            text-decoration: underline dotted #a5b4fc;
        }
        .grade-table tbody td:first-child .student-name-btn:hover { color: #4338ca; }
        .grade-cell {
            text-align: center;
            padding: 4px 6px;
            min-width: 70px;
        }
        .grade-input {
            width: 52px;
            text-align: center;
            background: transparent;
            border: none;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            outline: none;
            padding: 4px;
            border-radius: 6px;
            color: #1e1b4b;
        }
        .grade-input:focus { background: #eef2ff; }
        .avg-cell {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            padding: 10px 14px;
            position: sticky;
            right: 0;
            border-left: 2px solid var(--border);
            z-index: 5;
        }
        .avg-pass { color: #059669; background: #ecfdf5 !important; }
        .avg-fail { color: #e11d48; background: #fff1f2 !important; }
        .avg-na   { color: #94a3b8; }

        .points-row td { border-top: 2px dashed #c7d2fe; font-size: 10px; }

        /* Stat cards */
        .stat-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }

        /* Group card */
        .group-card {
            background: white;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: box-shadow 0.15s, border-color 0.15s;
        }
        .group-card:hover { box-shadow: 0 4px 20px rgba(67,56,202,0.12); border-color: #a5b4fc; }
        .group-card:active { transform: scale(0.98); }

        /* Header */
        .app-header {
            background: #1e1b4b;
            color: white;
            padding: 48px 20px 20px;
        }

        .tab-pill {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 4px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: all 0.2s;
            color: rgba(255,255,255,0.6);
            border: none;
            background: transparent;
            cursor: pointer;
        }
        .tab-btn.active {
            background: white;
            color: #1e1b4b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .icon-btn {
            width: 40px; height: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.12);
            border: none;
            color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.22); }
        .icon-btn:active { transform: scale(0.92); }

        /* Modal overlay */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15,14,23,0.55);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: flex;
            align-items: flex-end;
        }
        @media (min-width: 640px) {
            .modal-overlay { align-items: center; justify-content: center; }
        }
        .modal-sheet {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
        }
        @media (min-width: 640px) {
            .modal-sheet { border-radius: 24px; }
        }

        /* Student detail panel (full-screen overlay) */
        .student-panel {
            position: fixed; inset: 0;
            background: var(--surface);
            z-index: 45;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .student-panel-header {
            background: #1e1b4b;
            color: white;
            padding: 48px 20px 20px;
        }
        .student-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 100px;
        }

        /* Attendance */
        .att-btn {
            width: 44px; height: 44px;
            border-radius: 14px;
            font-size: 12px; font-weight: 800;
            border: none; cursor: pointer;
            transition: all 0.15s;
            background: #f1f5f9;
            color: #94a3b8;
        }
        .att-btn.active-P { background: #059669; color: white; box-shadow: 0 4px 12px rgba(5,150,105,0.35); transform: scale(1.1); }
        .att-btn.active-A { background: #e11d48; color: white; box-shadow: 0 4px 12px rgba(225,29,72,0.35); transform: scale(1.1); }
        .att-btn.active-T { background: #d97706; color: white; box-shadow: 0 4px 12px rgba(217,119,6,0.35); transform: scale(1.1); }

        /* Export menu */
        .export-menu {
            position: absolute; right: 0; top: calc(100% + 8px);
            background: white; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            border: 1px solid var(--border);
            width: 200px; z-index: 60;
            overflow: hidden;
            animation: pop 0.2s ease both;
        }
        .export-item {
            width: 100%; padding: 12px 16px;
            display: flex; align-items: center; gap: 10px;
            font-size: 13px; font-weight: 600; color: var(--ink);
            background: none; border: none; cursor: pointer; text-align: left;
            transition: background 0.1s;
        }
        .export-item:hover { background: #f5f4ff; }

        /* Progress bar */
        .progress-bar { height: 6px; border-radius: 99px; background: #e0dff8; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }

        /* Notification toast */
        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #1e1b4b; color: white;
            padding: 10px 20px; border-radius: 12px;
            font-size: 13px; font-weight: 600;
            z-index: 999; pointer-events: none;
            animation: slide-up 0.3s ease both;
            white-space: nowrap;
        }

        .fab {
            position: fixed; bottom: 28px; right: 20px;
            width: 58px; height: 58px;
            background: #4338ca;
            border-radius: 18px;
            border: none; color: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(67,56,202,0.4);
            cursor: pointer; z-index: 40;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .fab:active { transform: scale(0.92); box-shadow: 0 4px 12px rgba(67,56,202,0.3); }

        /* Form inputs */
        .form-input {
            width: 100%; padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-family: 'Sora', sans-serif;
            font-size: 14px; font-weight: 600;
            color: var(--ink); background: var(--surface);
            outline: none; transition: border-color 0.15s;
        }
        .form-input:focus { border-color: #4338ca; background: white; }

        .form-label {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: #94a3b8; margin-bottom: 6px; display: block;
        }

        .btn-primary {
            flex: 1; padding: 13px;
            background: #4338ca; color: white;
            border: none; border-radius: 12px;
            font-family: 'Sora', sans-serif;
            font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            cursor: pointer; transition: background 0.15s;
        }
        .btn-primary:hover { background: #3730a3; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { background: #c7d2fe; cursor: not-allowed; }

        .btn-ghost {
            flex: 1; padding: 13px;
            background: #f1f5f9; color: #64748b;
            border: none; border-radius: 12px;
            font-family: 'Sora', sans-serif;
            font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            cursor: pointer;
        }
        .btn-ghost:active { transform: scale(0.97); }

        /* Points input */
        .pts-input {
            width: 48px; text-align: center;
            border: 1.5px solid var(--border);
            border-radius: 8px; padding: 4px 6px;
            font-family: 'DM Mono', monospace;
            font-size: 13px; font-weight: 500;
            outline: none; background: white;
            color: var(--ink);
        }
        .pts-input:focus { border-color: #4338ca; }

        .cat-badge {
            display: inline-block;
            font-size: 9px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.05em;
            padding: 3px 8px; border-radius: 99px;
        }

        /* Activity header in table */
        .act-header { cursor: pointer; user-select: none; }
        .act-header:hover { background: #2d2a6e !important; }

        .section-label {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: #94a3b8; margin-bottom: 12px;
        }

        .risk-badge {
            font-size: 9px; font-weight: 800;
            text-transform: uppercase; padding: 2px 7px;
            border-radius: 99px; letter-spacing: 0.05em;
        }
        .risk-high { background: #fff1f2; color: #e11d48; }
        .risk-ok   { background: #ecfdf5; color: #059669; }

        /* Student detail cards */
        .grade-detail-card {
            background: white;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: border-color 0.15s;
        }
        .grade-detail-card:hover { border-color: #a5b4fc; }

        /* Edit grade inline */
        .inline-grade-input {
            font-family: 'DM Mono', monospace;
            font-size: 16px; font-weight: 700;
            text-align: center;
            border: 1.5px solid #c7d2fe;
            border-radius: 10px;
            padding: 6px 10px;
            width: 80px;
            color: #1e1b4b;
            background: #f5f4ff;
            outline: none;
        }
        .inline-grade-input:focus { border-color: #4338ca; background: white; }

        .inline-date-input {
            font-family: 'Sora', sans-serif;
            font-size: 11px; font-weight: 600;
            border: 1.5px solid #e0dff8;
            border-radius: 8px;
            padding: 4px 8px;
            color: #4338ca;
            background: #f5f4ff;
            outline: none;
            cursor: pointer;
        }
        .inline-date-input:focus { border-color: #4338ca; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── CONSTANTS ───────────────────────────────────────────────────────────────
    const CATEGORIES = [
        { id: 'diaria',    name: 'Diaria',     color: 'bg-blue-100 text-blue-700',    hex: '#1d4ed8' },
        { id: 'ejercicio', name: 'Ejercicio',   color: 'bg-violet-100 text-violet-700', hex: '#6d28d9' },
        { id: 'actividad', name: 'Actividad',   color: 'bg-emerald-100 text-emerald-700', hex: '#065f46' },
        { id: 'examen',    name: 'Examen',      color: 'bg-rose-100 text-rose-700',    hex: '#be123c' }
    ];

    const CAT_COLORS = {
        diaria:    { bg: '#dbeafe', text: '#1d4ed8' },
        ejercicio: { bg: '#ede9fe', text: '#6d28d9' },
        actividad: { bg: '#d1fae5', text: '#065f46' },
        examen:    { bg: '#ffe4e6', text: '#be123c' },
    };

    const ATT_STATUS = {
        P: { label: 'Presente', cls: 'active-P' },
        A: { label: 'Ausente',  cls: 'active-A' },
        T: { label: 'Tardanza', cls: 'active-T' }
    };

    const DEFAULT_DB = {
        groups: [], students: [], activities: [],
        grades: {}, attendance: {},
        actPoints: {},   // { actId: { obtained: number, total: number } }
        actDates: {}     // { actId: 'YYYY-MM-DD' }  ← NEW: store date per activity
    };

    // ─── FORMULA: (puntos obtenidos ÷ total de puntos) × 4 + 1 ──────────────────
    const calcGrade = (obtained, total) => {
        if (!total || total <= 0 || obtained === '' || obtained === undefined || obtained === null) return null;
        const o = parseFloat(obtained);
        const t = parseFloat(total);
        if (isNaN(o) || isNaN(t) || t === 0) return null;
        const g = (o / t) * 4 + 1;
        return Math.min(5, Math.max(1, g));
    };

    const fmtGrade = (v) => v === null ? '—' : v.toFixed(2);

    // Student avg across all activities in a group
    const calcStudentAvg = (sId, activities, grades, actPoints) => {
        let sum = 0, count = 0;
        for (const a of activities) {
            const pts = actPoints?.[a.id];
            const key = `${sId}_${a.id}`;
            if (pts?.total) {
                const obtained = grades[key];
                const g = calcGrade(obtained, pts.total);
                if (g !== null) { sum += g; count++; }
            }
        }
        if (!count) return null;
        return sum / count;
    };

    const fmtDate = (iso) => {
        if (!iso) return '';
        const [y, m, d] = iso.split('-');
        return `${d}/${m}/${y}`;
    };

    // ─── ICONS ───────────────────────────────────────────────────────────────────
    const Icons = {
        plus:   <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        back:   <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
        trash:  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
        save:   <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>,
        upload: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
        download:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
        close:  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        edit:   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
        restore:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.91L1 10"/></svg>,
        students:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
        chart:  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
        eye:    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
        calendar:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
    };

    // ─── TOAST ───────────────────────────────────────────────────────────────────
    function Toast({ msg, onDone }) {
        useEffect(() => { const t = setTimeout(onDone, 2000); return () => clearTimeout(t); }, []);
        return <div className="toast">{msg}</div>;
    }

    // ─── ATTENDANCE SUMMARY ───────────────────────────────────────────────────────
    function AttSummary({ students, attendance }) {
        if (!students.length) return null;

        const allDates = [...new Set(
            Object.keys(attendance).map(k => k.split('_')[1]).filter(Boolean)
        )].sort();

        if (!allDates.length) return (
            <div style={{ padding: '32px', textAlign: 'center', color: '#94a3b8', fontSize: 13 }}>
                Sin registros de asistencia aún.<br/>Usa la pestaña Asistencia para registrar.
            </div>
        );

        return (
            <div style={{ padding: '0 4px' }}>
                <p className="section-label" style={{ marginBottom: 16 }}>
                    Resumen — {allDates.length} días registrados
                </p>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                    {students.map(s => {
                        let P = 0, A = 0, T = 0;
                        allDates.forEach(d => {
                            const v = attendance[`${s.id}_${d}`];
                            if (v === 'P') P++;
                            else if (v === 'A') A++;
                            else if (v === 'T') T++;
                        });
                        const total = allDates.length;
                        const attPct = total ? Math.round(((P + T) / total) * 100) : 100;
                        const atRisk = attPct < 80;

                        return (
                            <div key={s.id} style={{
                                background: 'white', borderRadius: 14,
                                padding: '14px 16px', border: '1.5px solid #e0dff8'
                            }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                                    <span style={{ fontSize: 12, fontWeight: 700, color: '#1e1b4b' }}>{s.name}</span>
                                    <span className={`risk-badge ${atRisk ? 'risk-high' : 'risk-ok'}`}>
                                        {attPct}% asistencia
                                    </span>
                                </div>
                                <div className="progress-bar">
                                    <div className="progress-fill" style={{
                                        width: `${attPct}%`,
                                        background: atRisk ? '#e11d48' : '#059669'
                                    }}/>
                                </div>
                                <div style={{ display: 'flex', gap: 10, marginTop: 8 }}>
                                    {[['P','✓ Presentes','#059669','#ecfdf5'],['T','⚠ Tardanzas','#d97706','#fef3c7'],['A','✗ Ausencias','#e11d48','#fff1f2']].map(([key, label, color, bg]) => {
                                        const count = key === 'P' ? P : key === 'T' ? T : A;
                                        return (
                                            <span key={key} style={{
                                                fontSize: 10, fontWeight: 700, padding: '3px 8px',
                                                borderRadius: 99, background: bg, color
                                            }}>{label}: {count}</span>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    }

    // ─── STUDENT DETAIL PANEL ────────────────────────────────────────────────────
    function StudentDetailPanel({ student, activities, grades, actPoints, actDates, attendance, onClose, onGradeChange, onDateChange }) {
        const [editingGrade, setEditingGrade] = useState(null); // actId being edited
        const [tempVal, setTempVal] = useState('');
        const [tempDate, setTempDate] = useState('');

        if (!student) return null;

        const avg = calcStudentAvg(student.id, activities, grades, actPoints);
        const avgPass = avg !== null && avg >= 3;

        // Attendance summary for this student
        const allDates = [...new Set(
            Object.keys(attendance).map(k => k.split('_')[1]).filter(Boolean)
        )].sort();
        let P = 0, A = 0, T = 0;
        allDates.forEach(d => {
            const v = attendance[`${student.id}_${d}`];
            if (v === 'P') P++;
            else if (v === 'A') A++;
            else if (v === 'T') T++;
        });
        const attPct = allDates.length ? Math.round(((P + T) / allDates.length) * 100) : null;

        const startEdit = (a) => {
            const key = `${student.id}_${a.id}`;
            setEditingGrade(a.id);
            setTempVal((grades[key] ?? '').toString());
            setTempDate(actDates?.[a.id] || new Date().toISOString().split('T')[0]);
        };

        const saveEdit = (a) => {
            onGradeChange(student.id, a.id, tempVal);
            onDateChange(a.id, tempDate);
            setEditingGrade(null);
        };

        const cancelEdit = () => setEditingGrade(null);

        return (
            <div className="student-panel animate-slide-right">
                {/* Header */}
                <div className="student-panel-header">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                            <button className="icon-btn" onClick={onClose} aria-label="Volver">{Icons.back}</button>
                            <div>
                                <p style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Perfil del estudiante</p>
                                <h2 style={{ fontSize: 18, fontWeight: 800, lineHeight: 1.2 }}>{student.name}</h2>
                            </div>
                        </div>
                        {avg !== null && (
                            <div style={{
                                background: avgPass ? '#059669' : '#e11d48',
                                borderRadius: 14, padding: '8px 14px', textAlign: 'center'
                            }}>
                                <div style={{ fontSize: 20, fontWeight: 800, fontFamily: 'DM Mono, monospace' }}>{avg.toFixed(2)}</div>
                                <div style={{ fontSize: 8, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', opacity: 0.8 }}>Promedio</div>
                            </div>
                        )}
                    </div>
                    {/* Attendance mini-bar */}
                    {attPct !== null && (
                        <div style={{ marginTop: 14, background: 'rgba(255,255,255,0.1)', borderRadius: 12, padding: '10px 14px' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                                <span style={{ fontSize: 10, fontWeight: 700, color: 'rgba(255,255,255,0.6)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Asistencia</span>
                                <span style={{ fontSize: 11, fontWeight: 800, color: attPct >= 80 ? '#6ee7b7' : '#fca5a5' }}>{attPct}%</span>
                            </div>
                            <div style={{ height: 4, borderRadius: 99, background: 'rgba(255,255,255,0.15)', overflow: 'hidden' }}>
                                <div style={{ height: '100%', borderRadius: 99, width: `${attPct}%`, background: attPct >= 80 ? '#34d399' : '#f87171' }} />
                            </div>
                            <div style={{ display: 'flex', gap: 12, marginTop: 6 }}>
                                {[['✓',P,'rgba(255,255,255,0.5)'],['⚠',T,'rgba(217,119,6,0.8)'],['✗',A,'rgba(248,113,113,0.8)']].map(([icon, count, color]) => (
                                    <span key={icon} style={{ fontSize: 10, color, fontWeight: 700 }}>{icon} {count}</span>
                                ))}
                            </div>
                        </div>
                    )}
                </div>

                {/* Body */}
                <div className="student-panel-body no-scrollbar">
                    <p className="section-label" style={{ marginTop: 4 }}>
                        {activities.length} actividades registradas
                    </p>

                    {activities.length === 0 && (
                        <div style={{ textAlign: 'center', color: '#94a3b8', fontSize: 13, padding: '40px 0' }}>
                            <div style={{ fontSize: 32, marginBottom: 10 }}>📝</div>
                            No hay actividades en este grupo todavía.
                        </div>
                    )}

                    {activities.map(a => {
                        const key = `${student.id}_${a.id}`;
                        const obtained = grades[key];
                        const pts = actPoints?.[a.id] || {};
                        const grade = calcGrade(obtained, pts.total);
                        const cat = CAT_COLORS[a.category] || CAT_COLORS.diaria;
                        const date = actDates?.[a.id] || '';
                        const isEditing = editingGrade === a.id;

                        return (
                            <div key={a.id} className="grade-detail-card">
                                {/* Top row: category + name + date */}
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
                                            <span style={{
                                                fontSize: 9, padding: '2px 8px', borderRadius: 99,
                                                background: cat.bg, color: cat.text, fontWeight: 800, textTransform: 'uppercase'
                                            }}>{a.category}</span>
                                        </div>
                                        <p style={{ fontSize: 13, fontWeight: 700, color: '#1e1b4b', lineHeight: 1.3 }}>{a.name}</p>
                                        {isEditing ? (
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 6 }}>
                                                <span style={{ fontSize: 10, color: '#94a3b8' }}>{Icons.calendar}</span>
                                                <input
                                                    type="date"

                                            <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginTop: 4 }}>
                                                <span style={{ fontSize: 10, color: '#a5b4fc' }}>{Icons.calendar}</span>
                                                <span style={{ fontSize: 10, color: '#94a3b8', fontWeight: 600 }}>{fmtDate(date)}</span>
                                            </div>
                                        ) : null}
                                    </div>

                                    {/* Grade display / edit */}
                                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, minWidth: 90 }}>
                                        {isEditing ? (
                                            <>
                                                <input
                                                    autoFocus
                                                    type="number" step="0.5" min="0"
                                                    className="inline-grade-input"
                                                    value={tempVal}
                                                    onChange={e => setTempVal(e.target.value)}
                                                    placeholder="Pts"
                                                />
                                                {pts.total && tempVal !== '' && (
                                                    <span style={{
                                                        fontSize: 10, fontFamily: 'DM Mono, monospace', fontWeight: 700,
                                                        color: calcGrade(Number(tempVal), pts.total) >= 3 ? '#059669' : '#e11d48'
                                                    }}>
