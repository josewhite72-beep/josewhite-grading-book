                                                <div style={{ display: 'flex', gap: 6, marginTop: 2 }}>
                                                    <button onClick={cancelEdit} style={{
                                                        fontSize: 10, fontWeight: 700, padding: '4px 8px', borderRadius: 8,
                                                        border: '1.5px solid #e0dff8', background: 'white', color: '#64748b', cursor: 'pointer'
                                                    }}>✕</button>
                                                    <button onClick={() => saveEdit(a)} style={{
                                                        fontSize: 10, fontWeight: 700, padding: '4px 10px', borderRadius: 8,
                                                        border: 'none', background: '#4338ca', color: 'white', cursor: 'pointer'
                                                    }}>✓ Guardar</button>
                                                </div>
                                            </>
                                        ) : (
                                            <>
                                                <div style={{ textAlign: 'center' }}>
                                                    {obtained !== undefined && obtained !== null && obtained !== '' ? (
                                                        <>
                                                            <div style={{ fontSize: 11, color: '#94a3b8', fontWeight: 600, fontFamily: 'DM Mono, monospace' }}>
                                                                {obtained}{pts.total ? `/${pts.total}` : ' pts'}
                                                            </div>
                                                            {grade !== null && (
                                                                <div style={{
                                                                    fontSize: 20, fontWeight: 800, fontFamily: 'DM Mono, monospace',
                                                                    color: grade >= 3 ? '#059669' : '#e11d48'
                                                                }}>{fmtGrade(grade)}</div>
                                                            )}
                                                        </>
                                                    ) : (
                                                        <div style={{ fontSize: 13, color: '#c7d2fe', fontWeight: 700 }}>Sin nota</div>
                                                    )}
                                                </div>
                                                <button onClick={() => startEdit(a)} style={{
                                                    display: 'flex', alignItems: 'center', gap: 4,
                                                    fontSize: 10, fontWeight: 700, padding: '4px 10px', borderRadius: 8,
                                                    border: '1.5px solid #c7d2fe', background: '#f5f4ff', color: '#4338ca', cursor: 'pointer'
                                                }}>
                                                    {Icons.edit} Editar
                                                </button>
                                            </>
                                        )}
                                    </div>
                                </div>

                                {/* Progress bar for grade */}
                                {grade !== null && !isEditing && (
                                    <div className="progress-bar" style={{ marginTop: 4 }}>
                                        <div className="progress-fill" style={{
                                            width: `${((grade - 1) / 4) * 100}%`,
                                            background: grade >= 3 ? '#059669' : '#e11d48'
                                        }}/>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    }

    // ─── GRADES TABLE ─────────────────────────────────────────────────────────────
    function GradesTable({ students, activities, grades, actPoints, actDates, onGradeChange, onPointsChange, onDeleteActivity, onStudentClick }) {
        if (!students.length) return (
            <div style={{ padding: '32px', textAlign: 'center', color: '#94a3b8', fontSize: 13 }}>
                Sin estudiantes en este grupo todavía.
            </div>
        );

        return (
            <div style={{ overflowX: 'auto', borderRadius: 16, border: '1.5px solid #e0dff8', background: 'white' }}>
                <table className="grade-table">
                    <thead>
                        <tr>
                            <th style={{ background: '#1e1b4b', textAlign: 'left' }}>
                                <div style={{ display: 'flex', flexDirection: 'column' }}>
                                    <span>Estudiante</span>
                                    <span style={{ fontSize: 8, color: 'rgba(165,180,252,0.8)', fontWeight: 600, marginTop: 2 }}>Toca para ver perfil</span>
                                </div>
                            </th>
                            {activities.map(a => {
                                const cat = CAT_COLORS[a.category] || CAT_COLORS.diaria;
                                const date = actDates?.[a.id];
                                return (
                                    <th key={a.id} className="act-header" style={{ background: '#1e1b4b', textAlign: 'center' }}>
                                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3 }}>
                                            <span style={{
                                                fontSize: 8, padding: '1px 6px', borderRadius: 99,
                                                background: cat.bg, color: cat.text, fontWeight: 800
                                            }}>{a.category}</span>
                                            <span style={{ fontWeight: 700, maxWidth: 80, overflow: 'hidden', textOverflow: 'ellipsis', display: 'block' }} title={a.name}>{a.name.length > 10 ? a.name.slice(0,10)+'…' : a.name}</span>
                                            {date && (
                                                <span style={{ fontSize: 8, color: 'rgba(165,180,252,0.8)', fontWeight: 600 }}>{fmtDate(date)}</span>
                                            )}
                                            <button
                                                onClick={() => onDeleteActivity(a.id)}
                                                style={{ background: 'rgba(255,255,255,0.1)', border: 'none', color: 'rgba(255,255,255,0.5)', borderRadius: 6, padding: '1px 6px', fontSize: 9, cursor: 'pointer', marginTop: 2 }}
                                                title="Eliminar actividad"
                                            >✕ eliminar</button>
                                        </div>
                                    </th>
                                );
                            })}
                            {activities.length > 0 && (
                                <th style={{ background: '#1e1b4b', textAlign: 'center', position: 'sticky', right: 0 }}>
                                    PROM
                                </th>
                            )}
                        </tr>
                        {/* Points row */}
                        {activities.length > 0 && (
                            <tr style={{ background: '#2d2a6e' }}>
                                <th style={{ background: '#2d2a6e', fontSize: 9, color: '#a5b4fc', textAlign: 'left', padding: '6px 12px' }}>
                                    Pts obtenidos / total
                                </th>
                                {activities.map(a => {
                                    const pts = actPoints?.[a.id] || {};
                                    return (
                                        <th key={a.id} style={{ background: '#2d2a6e', textAlign: 'center', padding: '4px 6px' }}>
                                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 3 }}>
                                                <span style={{ color: '#c7d2fe', fontSize: 10 }}>Total:</span>
                                                <input
                                                    type="number" min="1" className="pts-input"
                                                    style={{ width: 44, background: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.2)', color: 'white' }}
                                                    value={pts.total ?? ''}
                                                    placeholder="100"
                                                    onChange={e => onPointsChange(a.id, 'total', e.target.value)}
                                                    title="Puntos totales de la actividad"
                                                />
                                            </div>
                                        </th>
                                    );
                                })}
                                <th style={{ background: '#2d2a6e', position: 'sticky', right: 0 }}></th>
                            </tr>
                        )}
                    </thead>
                    <tbody>
                        {students.map(s => {
                            const avg = calcStudentAvg(s.id, activities, grades, actPoints);
                            const avgPass = avg !== null && avg >= 3;
                            return (
                                <tr key={s.id} onClick={() => onStudentClick(s)} title="Ver perfil del estudiante">
                                    <td>
                                        <button className="student-name-btn" onClick={e => { e.stopPropagation(); onStudentClick(s); }}>
                                            {s.name}
                                        </button>
                                    </td>
                                    {activities.map(a => {
                                        const pts = actPoints?.[a.id] || {};
                                        const key = `${s.id}_${a.id}`;
                                        const obtained = grades[key];
                                        const computed = calcGrade(obtained, pts.total);
                                        return (
                                            <td key={a.id} className="grade-cell" onClick={e => e.stopPropagation()}>
                                                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1 }}>
                                                    <input
                                                        type="number" step="0.5" min="0"
                                                        className="grade-input"
                                                        value={obtained ?? ''}
                                                        placeholder="—"
                                                        onChange={e => onGradeChange(s.id, a.id, e.target.value)}
                                                        title={pts.total ? `Nota: ${fmtGrade(computed)}` : 'Define los puntos totales primero'}
                                                    />
                                                    {computed !== null && (
                                                        <span style={{
                                                            fontSize: 9, fontFamily: 'DM Mono, monospace', fontWeight: 700,
                                                            color: computed >= 3 ? '#059669' : '#e11d48'
                                                        }}>{fmtGrade(computed)}</span>
                                                    )}
                                                </div>
                                            </td>
                                        );
                                    })}
                                    {activities.length > 0 && (
                                        <td className={`avg-cell ${avg === null ? 'avg-na' : avgPass ? 'avg-pass' : 'avg-fail'}`}>
                                            {avg === null ? '—' : avg.toFixed(2)}
                                        </td>
                                    )}
                                </tr>
                            );
                        })}
                    </tbody>
                </table>
            </div>
        );
    }

    // ─── MAIN APP ────────────────────────────────────────────────────────────────
    function App() {
        const [data, setData] = useState(() => {
            try {
                const saved = localStorage.getItem('TP_MASTER_DB_v2');
                if (saved) return { ...DEFAULT_DB, ...JSON.parse(saved) };
            } catch {}
            // Try migrating from old key
            try {
                const old = localStorage.getItem('TP_MASTER_DB');
                if (old) return { ...DEFAULT_DB, ...JSON.parse(old) };
            } catch {}
            return DEFAULT_DB;
        });

        const [view, setView] = useState('groups');
        const [tab, setTab] = useState('grades');
        const [selectedGroupId, setSelectedGroupId] = useState(null);
        const [selectedDate, setSelectedDate] = useState(() => new Date().toISOString().split('T')[0]);
        const [modal, setModal] = useState(null);
        const [inputValue, setInputValue] = useState('');
        const [input2, setInput2] = useState('');
        const [selectedCat, setSelectedCat] = useState('diaria');
        const [actPtsInput, setActPtsInput] = useState('');
        const [actDateInput, setActDateInput] = useState(() => new Date().toISOString().split('T')[0]);
        const [showExportMenu, setShowExportMenu] = useState(false);
        const [toast, setToast] = useState(null);
        const [selectedStudent, setSelectedStudent] = useState(null); // for profile panel
        const exportMenuRef = useRef(null);
        const fileInputRef = useRef(null);
        const restoreInputRef = useRef(null);

        // Auto-save
        useEffect(() => {
            try { localStorage.setItem('TP_MASTER_DB_v2', JSON.stringify(data)); } catch {}
        }, [data]);

        // Close export menu on outside click
        useEffect(() => {
            const h = e => { if (exportMenuRef.current && !exportMenuRef.current.contains(e.target)) setShowExportMenu(false); };
            document.addEventListener('mousedown', h);
            return () => document.removeEventListener('mousedown', h);
        }, []);

        const showToast = (msg) => { setToast(msg); };

        // Derived
        const activeGroup = data.groups.find(g => g.id === selectedGroupId);
        const groupStudents = data.students.filter(s => s.groupId === selectedGroupId).sort((a, b) => a.name.localeCompare(b.name));
        const groupActivities = data.activities.filter(a => a.groupId === selectedGroupId);

        // ── CRUD ──────────────────────────────────────────────────────────────────
        const addGroup = () => {
            const name = inputValue.trim();
            if (!name) return;
            setData(prev => ({ ...prev, groups: [...prev.groups, { id: 'g' + Date.now(), name }] }));
            closeModal(); showToast('Grupo creado');
        };

        const addStudent = () => {
            const name = inputValue.trim();
            if (!name || !selectedGroupId) return;
            setData(prev => ({ ...prev, students: [...prev.students, { id: 's' + Date.now(), name, groupId: selectedGroupId }] }));
            setInputValue(''); showToast('Estudiante agregado');
        };

        const addActivity = () => {
            const name = inputValue.trim();
            if (!name || !selectedGroupId) return;
            const id = 'a' + Date.now();
            setData(prev => ({
                ...prev,
                activities: [...prev.activities, { id, name, groupId: selectedGroupId, category: selectedCat }],
                actPoints: { ...prev.actPoints, [id]: { total: actPtsInput ? Number(actPtsInput) : null } },
                actDates: { ...(prev.actDates || {}), [id]: actDateInput || new Date().toISOString().split('T')[0] }
            }));
            closeModal(); showToast('Actividad creada');
        };

        const deleteGroup = (gId) => {
            if (!confirm('¿Eliminar grupo y todos sus datos?')) return;
            setData(prev => {
                const studentIds = prev.students.filter(s => s.groupId === gId).map(s => s.id);
                const actIds = prev.activities.filter(a => a.groupId === gId).map(a => a.id);
                const newGrades = { ...prev.grades };
                const newAtt = { ...prev.attendance };
                const newPts = { ...prev.actPoints };
                const newDates = { ...(prev.actDates || {}) };
                studentIds.forEach(sId => {
                    Object.keys(newGrades).filter(k => k.startsWith(sId + '_')).forEach(k => delete newGrades[k]);
                    Object.keys(newAtt).filter(k => k.startsWith(sId + '_')).forEach(k => delete newAtt[k]);
                });
                actIds.forEach(aId => { delete newPts[aId]; delete newDates[aId]; });
                return {
                    ...prev,
                    groups: prev.groups.filter(g => g.id !== gId),
                    students: prev.students.filter(s => s.groupId !== gId),
                    activities: prev.activities.filter(a => a.groupId !== gId),
                    grades: newGrades, attendance: newAtt, actPoints: newPts, actDates: newDates
                };
            });
        };

        const deleteStudent = (sId) => {
            if (!confirm('¿Eliminar estudiante?')) return;
            setData(prev => {
                const newGrades = Object.fromEntries(Object.entries(prev.grades).filter(([k]) => !k.startsWith(sId + '_')));
                const newAtt = Object.fromEntries(Object.entries(prev.attendance).filter(([k]) => !k.startsWith(sId + '_')));
                return { ...prev, students: prev.students.filter(s => s.id !== sId), grades: newGrades, attendance: newAtt };
            });
            if (selectedStudent?.id === sId) setSelectedStudent(null);
        };

        const deleteActivity = (aId) => {
            if (!confirm('¿Eliminar actividad y sus calificaciones?')) return;
            setData(prev => {
                const newGrades = Object.fromEntries(Object.entries(prev.grades).filter(([k]) => !k.endsWith('_' + aId)));
                const newPts = { ...prev.actPoints };
                const newDates = { ...(prev.actDates || {}) };
                delete newPts[aId]; delete newDates[aId];
                return { ...prev, activities: prev.activities.filter(a => a.id !== aId), grades: newGrades, actPoints: newPts, actDates: newDates };
            });
        };

        const editName = () => {
            const name = inputValue.trim();
            if (!name || !modal?.payload) return;
            const { kind, id } = modal.payload;
            setData(prev => ({
                ...prev,
                [kind]: prev[kind].map(item => item.id === id ? { ...item, name } : item)
            }));
            closeModal(); showToast('Nombre actualizado');
        };

        const updateGrade = (sId, aId, val) => {
            const raw = (val ?? '').toString().trim();
            setData(prev => ({
                ...prev,
                grades: { ...prev.grades, [`${sId}_${aId}`]: raw === '' ? undefined : Number(raw) }
            }));
        };

        const updateActivityDate = (aId, dateVal) => {
            setData(prev => ({
                ...prev,
                actDates: { ...(prev.actDates || {}), [aId]: dateVal }
            }));
        };

        const updatePoints = (aId, field, val) => {
            setData(prev => ({
                ...prev,
                actPoints: {
                    ...prev.actPoints,
                    [aId]: { ...(prev.actPoints?.[aId] || {}), [field]: val === '' ? null : Number(val) }
                }
            }));
        };

        const setAtt = (sId, status) => {
            const key = `${sId}_${selectedDate}`;
            setData(prev => ({
                ...prev,
                attendance: { ...prev.attendance, [key]: prev.attendance[key] === status ? undefined : status }
            }));
        };

        const closeModal = () => { setModal(null); setInputValue(''); setInput2(''); setActPtsInput(''); setActDateInput(new Date().toISOString().split('T')[0]); };

        // ── IMPORT ────────────────────────────────────────────────────────────────
        const importStudentList = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const lines = ev.target.result.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
                if (!lines.length) return alert('Archivo vacío');
                const now = Date.now();
                const newStudents = lines.map((name, i) => ({
                    id: 's' + now + '_' + i, name, groupId: selectedGroupId
                }));
                setData(prev => ({ ...prev, students: [...prev.students, ...newStudents] }));
                showToast(`${lines.length} estudiantes importados`);
                e.target.value = null;
            };
            reader.readAsText(file);
        };

        const restoreBackup = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const parsed = JSON.parse(ev.target.result);
                    if (!parsed.groups) throw new Error('Formato inválido');
                    if (!confirm(`¿Restaurar respaldo? Esto reemplazará todos los datos actuales.`)) return;
                    setData({ ...DEFAULT_DB, ...parsed });
                    showToast('Respaldo restaurado');
                } catch {
                    alert('Archivo de respaldo inválido.');
                }
                e.target.value = null;
            };
            reader.readAsText(file);
        };

        // ── BACKUP ───────────────────────────────────────────────────────────────
        const handleBackup = () => {
            const blob = new Blob([JSON.stringify({ ...data, _version: '3.0', _date: new Date().toISOString() }, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Respaldo_TeacherPanama_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Respaldo descargado');
        };

        // ── EXPORTS ──────────────────────────────────────────────────────────────
        const exportToPDF = () => {
            setShowExportMenu(false);
            if (!selectedGroupId) return;
            const group = activeGroup;
            const students = groupStudents;
            const activities = groupActivities;
            if (!students.length) return alert('No hay estudiantes en este grupo.');

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18); doc.setTextColor(30, 27, 75);
            doc.text(`Reporte: ${group?.name || 'Grupo'}`, 14, 16);
            doc.setFontSize(10); doc.setTextColor(100);
            doc.text(`Generado: ${new Date().toLocaleDateString()} — ${students.length} estudiantes`, 14, 23);

            if (activities.length > 0) {
                const headers = ['Estudiante', ...activities.map(a => a.name.slice(0,14)), 'Promedio'];
                const rows = students.map(s => {
                    const row = [s.name.slice(0,22)];
                    activities.forEach(a => {
                        const pts = data.actPoints?.[a.id];
                        const obtained = data.grades[`${s.id}_${a.id}`];
                        const g = calcGrade(obtained, pts?.total);
                        row.push(g !== null ? fmtGrade(g) : '—');
                    });
                    const avg = calcStudentAvg(s.id, activities, data.grades, data.actPoints);
                    row.push(avg !== null ? avg.toFixed(2) : '—');
                    return row;
                });
                doc.autoTable({ head: [headers], body: rows, startY: 30, theme: 'grid',
                    styles: { fontSize: 8, cellPadding: 2 },
                    headStyles: { fillColor: [30, 27, 75], textColor: 255 },
                    margin: { left: 10, right: 10 }
                });
            }

            const attDates = [...new Set(Object.keys(data.attendance).map(k => k.split('_')[1]).filter(Boolean))].sort().slice(-7);
            if (attDates.length) {
                doc.addPage();
                doc.setFontSize(14); doc.setTextColor(30,27,75);
                doc.text('Asistencia (últimas 7 fechas)', 14, 16);
                const attHeaders = ['Estudiante', ...attDates.map(d => new Date(d + 'T12:00').toLocaleDateString('es-PA', { month: 'short', day: 'numeric' }))];
                const attRows = students.map(s => [s.name.slice(0,22), ...attDates.map(d => data.attendance[`${s.id}_${d}`] || '—')]);
                doc.autoTable({ head: [attHeaders], body: attRows, startY: 24, theme: 'grid',
                    styles: { fontSize: 8, cellPadding: 2 },
                    headStyles: { fillColor: [5, 150, 105], textColor: 255 },
                    margin: { left: 10, right: 10 }
                });
            }

            doc.save(`Reporte_${(group?.name || 'Grupo').replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
            showToast('PDF exportado');
        };

        const exportToExcel = () => {
            setShowExportMenu(false);
            if (!groupStudents.length) return alert('No hay estudiantes.');
            const students = groupStudents;
            const activities = groupActivities;
            const wb = XLSX.utils.book_new();

            const gradeHeaders = ['Estudiante', ...activities.map(a => `${a.name}${data.actDates?.[a.id] ? ' (' + fmtDate(data.actDates[a.id]) + ')' : ''}`), 'Promedio'];
            const gradeRows = students.map(s => {
                const row = [s.name];
                activities.forEach(a => {
                    const pts = data.actPoints?.[a.id];
                    const obtained = data.grades[`${s.id}_${a.id}`];
                    const g = calcGrade(obtained, pts?.total);
                    row.push(g !== null ? parseFloat(fmtGrade(g)) : '');
                });
                const avg = calcStudentAvg(s.id, activities, data.grades, data.actPoints);
                row.push(avg !== null ? parseFloat(avg.toFixed(2)) : '');
                return row;
            });
            const ws = XLSX.utils.aoa_to_sheet([gradeHeaders, ...gradeRows]);
            ws['!cols'] = gradeHeaders.map((_, i) => ({ wch: i === 0 ? 28 : 16 }));
            XLSX.utils.book_append_sheet(wb, ws, 'Calificaciones');

            const attDates = [...new Set(Object.keys(data.attendance).map(k => k.split('_')[1]).filter(Boolean))].sort();
            if (attDates.length) {
                const attHeaders = ['Estudiante', ...attDates.map(d => new Date(d+'T12:00').toLocaleDateString())];
                const attRows = students.map(s => [s.name, ...attDates.map(d => data.attendance[`${s.id}_${d}`] || '')]);
                const wsA = XLSX.utils.aoa_to_sheet([attHeaders, ...attRows]);
                wsA['!cols'] = attHeaders.map((_, i) => ({ wch: i === 0 ? 28 : 12 }));
                XLSX.utils.book_append_sheet(wb, wsA, 'Asistencia');
            }

            XLSX.writeFile(wb, `Reporte_${(activeGroup?.name||'Grupo').replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
            showToast('Excel exportado');
        };

        const exportToWord = () => {
            setShowExportMenu(false);
            const students = groupStudents;
            const activities = groupActivities;
            if (!students.length) return alert('No hay estudiantes.');

            const gradeRows = students.map(s => {
                const cells = activities.map(a => {
                    const pts = data.actPoints?.[a.id];
                    const obtained = data.grades[`${s.id}_${a.id}`];
                    const g = calcGrade(obtained, pts?.total);
                    return `<td style="text-align:center">${g !== null ? fmtGrade(g) : '—'}</td>`;
                }).join('');
                const avg = calcStudentAvg(s.id, activities, data.grades, data.actPoints);
                return `<tr><td>${s.name}</td>${cells}<td><strong>${avg !== null ? avg.toFixed(2) : '—'}</strong></td></tr>`;
            }).join('');

            const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
                body{font-family:Arial;margin:40px}h1{color:#1e1b4b}
                table{border-collapse:collapse;width:100%;margin:20px 0}
                th,td{border:1px solid #d1d5db;padding:8px 10px;font-size:12px}
                th{background:#1e1b4b;color:white}
                tr:nth-child(even){background:#f9fafb}
                </style></head><body>
                <h1>Reporte: ${activeGroup?.name || 'Grupo'}</h1>
                <p>Fecha: ${new Date().toLocaleDateString()} | Estudiantes: ${students.length}</p>
                <h2>Calificaciones <small style="font-size:11px;color:#6b7280">(fórmula: (pts ÷ total) × 4 + 1)</small></h2>
                <table><tr><th>Estudiante</th>${activities.map(a=>`<th>${a.name}${data.actDates?.[a.id] ? '<br><small>' + fmtDate(data.actDates[a.id]) + '</small>' : ''}</th>`).join('')}<th>Promedio</th></tr>
                ${gradeRows}</table>
                <p style="font-size:11px;color:#6b7280;margin-top:30px">Generado por Teacher Grading Book — ${new Date().toLocaleString()}</p>
                </body></html>`;

            const blob = new Blob([html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Reporte_${(activeGroup?.name||'Grupo').replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.doc`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Word exportado');
        };

        // ── RENDER ────────────────────────────────────────────────────────────────
        return (
            <div style={{ display: 'flex', flexDirection: 'column', height: '100dvh', maxWidth: 480, margin: '0 auto', background: '#f5f4ff', position: 'relative', overflow: 'hidden' }}>

                {/* HEADER */}
                <div className="app-header">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: view !== 'groups' ? 16 : 0 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                            {view !== 'groups' && (
                                <button className="icon-btn" onClick={() => setView('groups')} aria-label="Volver">
                                    {Icons.back}
                                </button>
                            )}
                            <div>
                                <h1 style={{ fontSize: view === 'groups' ? 22 : 18, fontWeight: 800, lineHeight: 1.1, letterSpacing: '-0.02em' }}>
                                    {view === 'groups' ? 'Teacher Grading Book' : activeGroup?.name}
                                </h1>
                                <p style={{ fontSize: 10, color: 'rgba(255,255,255,0.55)', fontWeight: 600, marginTop: 2, letterSpacing: '0.08em', textTransform: 'uppercase' }}>
                                    {view === 'groups'
                                        ? `${data.groups.length} grupos · datos locales`
                                        : `${groupStudents.length} estudiantes · ${groupActivities.length} actividades`}
                                </p>
                            </div>
                        </div>

                        <div style={{ display: 'flex', gap: 6 }}>
                            {view !== 'groups' && (
                                <div style={{ position: 'relative' }} ref={exportMenuRef}>
                                    <button className="icon-btn" onClick={() => setShowExportMenu(v => !v)} aria-label="Exportar">
                                        {Icons.download}
                                    </button>
                                    {showExportMenu && (
                                        <div className="export-menu">
                                            <button className="export-item" onClick={exportToPDF}>📄 Exportar PDF</button>
                                            <button className="export-item" onClick={exportToExcel}>📊 Exportar Excel</button>
                                            <button className="export-item" onClick={exportToWord}>📝 Exportar Word</button>
                                        </div>
                                    )}
                                </div>
                            )}
                            {view !== 'groups' && (
                                <button className="icon-btn" onClick={() => fileInputRef.current?.click()} aria-label="Importar lista">
                                    {Icons.upload}
                                    <input type="file" ref={fileInputRef} style={{ display: 'none' }} accept=".txt,.csv" onChange={importStudentList} />
                                </button>
                            )}
                            <button className="icon-btn" onClick={handleBackup} aria-label="Respaldo" title="Descargar respaldo JSON">
                                {Icons.save}
                            </button>
                            <button className="icon-btn" onClick={() => restoreInputRef.current?.click()} aria-label="Restaurar respaldo" title="Restaurar desde respaldo JSON">
                                {Icons.restore}
                                <input type="file" ref={restoreInputRef} style={{ display: 'none' }} accept=".json" onChange={restoreBackup} />
                            </button>
                        </div>
                    </div>

                    {view !== 'groups' && (
                        <div className="tab-pill">
                            <button className={`tab-btn ${tab === 'grades' ? 'active' : ''}`} onClick={() => setTab('grades')}>Calificaciones</button>
                            <button className={`tab-btn ${tab === 'attendance' ? 'active' : ''}`} onClick={() => setTab('attendance')}>Asistencia</button>
                            <button className={`tab-btn ${tab === 'summary' ? 'active' : ''}`} onClick={() => setTab('summary')}>Resumen</button>
                        </div>
                    )}
                </div>

                {/* MAIN CONTENT */}
                <main style={{ flex: 1, overflowY: 'auto', padding: '16px', paddingBottom: 100 }} className="no-scrollbar">

                    {/* GROUPS VIEW */}
                    {view === 'groups' && (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 8 }}>
                            {data.groups.length === 0 && (
                                <div style={{ textAlign: 'center', color: '#94a3b8', fontSize: 13, marginTop: 48 }}>
                                    <div style={{ fontSize: 36, marginBottom: 12 }}>📚</div>
                                    Crea tu primer grupo con el botón (+)
                                </div>
                            )}
                            {data.groups.map(g => {
                                const count = data.students.filter(s => s.groupId === g.id).length;
                                const acts = data.activities.filter(a => a.groupId === g.id).length;
                                return (
                                    <div key={g.id} className="group-card animate-pop" onClick={() => { setSelectedGroupId(g.id); setView('detail'); }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                                            <div style={{
                                                width: 50, height: 50, borderRadius: 16,
                                                background: '#f0eeff', color: '#4338ca',
                                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                fontSize: 20, fontWeight: 800
                                            }}>{g.name[0]?.toUpperCase()}</div>
                                            <div>
                                                <p style={{ fontWeight: 700, fontSize: 15, color: '#1e1b4b', marginBottom: 2 }}>{g.name}</p>
                                                <p style={{ fontSize: 10, color: '#94a3b8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em' }}>
                                                    {count} estudiantes · {acts} actividades
                                                </p>
                                            </div>
                                        </div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                            <button
                                                onClick={e => { e.stopPropagation(); setModal({ type: 'editName', payload: { kind: 'groups', id: g.id, current: g.name } }); setInputValue(g.name); }}
                                                style={{ background: 'none', border: 'none', color: '#94a3b8', cursor: 'pointer', padding: 4 }}
                                                aria-label="Editar nombre"
                                            >{Icons.edit}</button>
                                            <button
                                                onClick={e => { e.stopPropagation(); deleteGroup(g.id); }}
                                                style={{ background: 'none', border: 'none', color: '#fca5a5', cursor: 'pointer', padding: 4 }}
                                                aria-label="Eliminar"
                                            >{Icons.trash}</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* DETAIL VIEW — GRADES */}
                    {view === 'detail' && tab === 'grades' && (
                        <div>
                            {groupActivities.length === 0 && groupStudents.length > 0 && (
                                <div style={{ background: '#eef2ff', borderRadius: 14, padding: '14px 16px', marginBottom: 16, fontSize: 12, color: '#4338ca', fontWeight: 600 }}>
                                    💡 Crea una actividad con (+) para empezar a calificar. Define los puntos totales en la tabla.
                                </div>
                            )}
                            <GradesTable
                                students={groupStudents}
                                activities={groupActivities}
                                grades={data.grades}
                                actPoints={data.actPoints}
                                actDates={data.actDates || {}}
                                onGradeChange={updateGrade}
                                onPointsChange={updatePoints}
                                onDeleteActivity={deleteActivity}
                                onStudentClick={(s) => setSelectedStudent(s)}
                            />
                            {/* Students list below table */}
                            {groupStudents.length > 0 && (
                                <div style={{ marginTop: 20 }}>
                                    <p className="section-label">Estudiantes</p>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                                        {groupStudents.map(s => {
                                            const avg = calcStudentAvg(s.id, groupActivities, data.grades, data.actPoints);
                                            return (
                                                <div key={s.id} style={{
                                                    background: 'white', borderRadius: 12, padding: '10px 14px',
                                                    border: '1.5px solid #e0dff8', display: 'flex',
                                                    justifyContent: 'space-between', alignItems: 'center',
                                                    cursor: 'pointer'
                                                }} onClick={() => setSelectedStudent(s)}>
                                                    <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                                                        <button onClick={e => { e.stopPropagation(); setModal({ type: 'editName', payload: { kind: 'students', id: s.id, current: s.name } }); setInputValue(s.name); }}
                                                            style={{ background: 'none', border: 'none', color: '#c7d2fe', cursor: 'pointer', padding: 0 }}>{Icons.edit}</button>
                                                        <span style={{ fontSize: 12, fontWeight: 700, color: '#1e1b4b' }}>{s.name}</span>
                                                    </div>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                        {avg !== null && (
                                                            <span style={{
                                                                fontFamily: 'DM Mono, monospace', fontSize: 12, fontWeight: 700,
                                                                color: avg >= 3 ? '#059669' : '#e11d48',
                                                                background: avg >= 3 ? '#ecfdf5' : '#fff1f2',
                                                                padding: '2px 8px', borderRadius: 99
                                                            }}>{avg.toFixed(2)}</span>
                                                        )}
                                                        <span style={{ fontSize: 10, color: '#a5b4fc', fontWeight: 700 }}>👁 ver</span>
                                                        <button onClick={e => { e.stopPropagation(); deleteStudent(s.id); }}
                                                            style={{ background: 'none', border: 'none', color: '#fca5a5', cursor: 'pointer', padding: 0 }}>{Icons.trash}</button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* DETAIL VIEW — ATTENDANCE */}
                    {view === 'detail' && tab === 'attendance' && (
                        <div>
                            <div style={{ background: 'white', borderRadius: 14, padding: '12px 16px', marginBottom: 14, border: '1.5px solid #e0dff8', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <span style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: '#94a3b8' }}>Fecha</span>
                                <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)}
                                    style={{ fontFamily: 'Sora, sans-serif', fontSize: 13, fontWeight: 700, color: '#4338ca', border: 'none', outline: 'none', background: 'transparent', cursor: 'pointer' }} />
                            </div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                                {groupStudents.map(s => (
                                    <div key={s.id} style={{
                                        background: 'white', borderRadius: 14, padding: '12px 16px',
                                        border: '1.5px solid #e0dff8', display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                                    }}>
                                        <span style={{ fontSize: 12, fontWeight: 700, color: '#1e1b4b', maxWidth: 150, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.name}</span>
                                        <div style={{ display: 'flex', gap: 8 }}>
                                            {Object.entries(ATT_STATUS).map(([key, info]) => {
                                                const active = data.attendance[`${s.id}_${selectedDate}`] === key;
                                                return (
                                                    <button key={key} className={`att-btn ${active ? info.cls : ''}`}
                                                        onClick={() => setAtt(s.id, key)} aria-label={info.label}>{key}</button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                                {groupStudents.length === 0 && (
                                    <div style={{ textAlign: 'center', color: '#94a3b8', fontSize: 13, padding: 32 }}>
                                        Agrega estudiantes para registrar asistencia.
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* DETAIL VIEW — SUMMARY */}
                    {view === 'detail' && tab === 'summary' && (
                        <div>
                            {/* Quick stats */}
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 20 }}>
                                {[
                                    { label: 'Estudiantes', value: groupStudents.length, icon: '👥', color: '#4338ca', bg: '#eef2ff' },
                                    { label: 'Actividades', value: groupActivities.length, icon: '📝', color: '#7c3aed', bg: '#f5f3ff' },
                                    {
                                        label: 'Aprobados',
                                        value: groupStudents.filter(s => {
                                            const avg = calcStudentAvg(s.id, groupActivities, data.grades, data.actPoints);
                                            return avg !== null && avg >= 3;
                                        }).length,
                                        icon: '✅', color: '#059669', bg: '#ecfdf5'
                                    },
                                    {
                                        label: 'En riesgo',
                                        value: groupStudents.filter(s => {
                                            const avg = calcStudentAvg(s.id, groupActivities, data.grades, data.actPoints);
                                            return avg !== null && avg < 3;
                                        }).length,
                                        icon: '⚠️', color: '#e11d48', bg: '#fff1f2'
                                    },
                                ].map(({ label, value, icon, color, bg }) => (
                                    <div key={label} style={{ background: bg, borderRadius: 14, padding: '14px 16px', border: `1.5px solid ${color}22` }}>
                                        <div style={{ fontSize: 22, marginBottom: 4 }}>{icon}</div>
                                        <div style={{ fontSize: 22, fontWeight: 800, color, fontFamily: 'DM Mono, monospace' }}>{value}</div>
                                        <div style={{ fontSize: 10, fontWeight: 700, color: color + 'aa', textTransform: 'uppercase', letterSpacing: '0.06em' }}>{label}</div>
                                    </div>
                                ))}
                            </div>

                            {/* Students summary with tap-to-view */}
                            <p className="section-label">Promedios por estudiante</p>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 20 }}>
                                {groupStudents.map(s => {
                                    const avg = calcStudentAvg(s.id, groupActivities, data.grades, data.actPoints);
                                    const pass = avg !== null && avg >= 3;
                                    return (
                                        <div key={s.id} style={{
                                            background: 'white', borderRadius: 14, padding: '12px 16px',
                                            border: '1.5px solid #e0dff8', display: 'flex',
                                            justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer'
                                        }} onClick={() => { setTab('grades'); setSelectedStudent(s); }}>
                                            <div>
                                                <p style={{ fontSize: 12, fontWeight: 700, color: '#1e1b4b' }}>{s.name}</p>
                                                <p style={{ fontSize: 10, color: '#94a3b8', fontWeight: 600, marginTop: 2 }}>Toca para ver notas →</p>
                                            </div>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                {avg !== null ? (
                                                    <span style={{
                                                        fontFamily: 'DM Mono, monospace', fontSize: 14, fontWeight: 800,
                                                        color: pass ? '#059669' : '#e11d48',
                                                        background: pass ? '#ecfdf5' : '#fff1f2',
                                                        padding: '4px 10px', borderRadius: 99
                                                    }}>{avg.toFixed(2)}</span>
                                                ) : (
                                                    <span style={{ fontSize: 11, color: '#c7d2fe', fontWeight: 700 }}>Sin datos</span>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            <p className="section-label">Asistencia por estudiante</p>
                            <AttSummary students={groupStudents} attendance={data.attendance} />
                        </div>
                    )}
                </main>

                {/* FAB */}
                <button className="fab" onClick={() => {
                    if (view === 'groups') setModal({ type: 'group' });
                    else if (tab === 'grades') setModal({ type: 'activity' });
                    else setModal({ type: 'student' });
                }} aria-label="Agregar">
                    {Icons.plus}
                </button>

                {/* STUDENT DETAIL PANEL */}
                {selectedStudent && (
                    <StudentDetailPanel
                        student={selectedStudent}
                        activities={groupActivities}
                        grades={data.grades}
                        actPoints={data.actPoints}
                        actDates={data.actDates || {}}
                        attendance={data.attendance}
                        onClose={() => setSelectedStudent(null)}
                        onGradeChange={updateGrade}
                        onDateChange={updateActivityDate}
                    />
                )}

                {/* MODALS */}
                {modal && (
                    <div className="modal-overlay animate-fade" onClick={e => { if (e.target === e.currentTarget) closeModal(); }}>
                        <div className="modal-sheet animate-slide-up">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                                <h3 style={{ fontSize: 16, fontWeight: 800, color: '#1e1b4b' }}>
                                    {modal.type === 'group'    && 'Nuevo Grupo'}
                                    {modal.type === 'student'  && 'Agregar Estudiante'}
                                    {modal.type === 'activity' && 'Nueva Actividad'}
                                    {modal.type === 'editName' && 'Editar Nombre'}
                                </h3>
                                <button onClick={closeModal} style={{ background: '#f1f5f9', border: 'none', borderRadius: 10, width: 34, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: '#64748b' }}>
                                    {Icons.close}
                                </button>
                            </div>

                            <div style={{ marginBottom: 16 }}>
                                <label className="form-label">Nombre</label>
                                <input
                                    className="form-input"
                                    value={inputValue}
                                    onChange={e => setInputValue(e.target.value)}
                                    placeholder={
                                        modal.type === 'group' ? 'Ej. 3°A Inglés' :
                                        modal.type === 'student' ? 'Ej. María Gómez' :
                                        modal.type === 'activity' ? 'Ej. Quiz 1' :
                                        'Nuevo nombre'
                                    }
                                    autoFocus
                                    onKeyDown={e => { if (e.key === 'Enter') {
                                        if (modal.type === 'group') addGroup();
                                        else if (modal.type === 'student') addStudent();
                                        else if (modal.type === 'activity') addActivity();
                                        else if (modal.type === 'editName') editName();
                                    }}}
                                />
                            </div>

                            {modal.type === 'activity' && (
                                <>
                                    <div style={{ marginBottom: 16 }}>
                                        <label className="form-label">Categoría</label>
                                        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                                            {CATEGORIES.map(cat => (
                                                <button key={cat.id} onClick={() => setSelectedCat(cat.id)}
                                                    style={{
                                                        padding: '7px 14px', borderRadius: 10, fontSize: 12, fontWeight: 700,
                                                        border: '1.5px solid',
                                                        borderColor: selectedCat === cat.id ? '#4338ca' : '#e0dff8',
                                                        background: selectedCat === cat.id ? '#4338ca' : 'white',
                                                        color: selectedCat === cat.id ? 'white' : '#64748b',
                                                        cursor: 'pointer', transition: 'all 0.15s'
                                                    }}>{cat.name}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div style={{ marginBottom: 16 }}>
                                        <label className="form-label">Fecha de la actividad</label>
                                        <input
                                            type="date"
                                            className="form-input"
                                            value={actDateInput}
                                            onChange={e => setActDateInput(e.target.value)}
                                        />
                                    </div>
                                    <div style={{ marginBottom: 20 }}>
                                        <label className="form-label">Puntos totales (opcional)</label>
                                        <input
                                            type="number" min="1"
                                            className="form-input"
                                            value={actPtsInput}
                                            onChange={e => setActPtsInput(e.target.value)}
                                            placeholder="Ej. 100"
                                        />
                                        <p style={{ fontSize: 10, color: '#94a3b8', marginTop: 5, fontWeight: 600 }}>
                                            Nota = (puntos obtenidos ÷ total) × 4 + 1
                                        </p>
                                    </div>
                                </>
                            )}

                            {modal.type === 'student' && (
                                <p style={{ fontSize: 11, color: '#94a3b8', marginBottom: 16, fontWeight: 600 }}>
                                    Presiona Agregar o Enter para añadir más de uno.
                                </p>
                            )}

                            <div style={{ display: 'flex', gap: 10 }}>
                                <button className="btn-ghost" onClick={closeModal}>Cancelar</button>
                                <button className="btn-primary" onClick={() => {
                                    if (modal.type === 'group') addGroup();
                                    else if (modal.type === 'student') addStudent();
                                    else if (modal.type === 'activity') addActivity();
                                    else if (modal.type === 'editName') editName();
                                }}>
                                    {modal.type === 'editName' ? 'Guardar' : modal.type === 'student' ? 'Agregar' : 'Crear'}
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* TOAST */}
                {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
            </div>
        );
    }

    // Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js').catch(() => {});
        });
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
